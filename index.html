<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuildLedger Pro</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
.sidebar{width:220px;background:#1f1f1f;color:#fff;height:100vh;position:fixed;padding:15px}
.sidebar.collapsed{width:60px}
.main{margin-left:220px;padding:20px}
.sidebar.collapsed + .main{margin-left:60px}
button{padding:8px 12px;margin:5px;cursor:pointer}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
input{padding:6px;margin:4px;width:100%}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:8px;border-bottom:1px solid #ddd;text-align:left}
</style>
</head>
<body>

<div class="sidebar">
  <button onclick="toggleSidebar()">☰</button>
  <button onclick="copyShareLink()">🔗 Share</button>
</div>

<div class="main">
  <h2>BuildLedger Dashboard</h2>

  <div class="card">
    <h3>Add Source</h3>
    <input id="name" placeholder="Name">
    <input id="total" placeholder="Total">
    <input id="recv" placeholder="Received">
    <button onclick="addSource()">Add Source</button>
  </div>

  <div class="card">
    <h3>Add Expense</h3>
    <input id="desc" placeholder="Description">
    <input id="amt" placeholder="Amount">
    <select id="srcSelect"></select>
    <button onclick="addExpense()">Add Expense</button>
  </div>

  <div class="card">
    <h3>Sources</h3>
    <div id="sources"></div>
  </div>

  <div class="card">
    <h3>Expenses</h3>
    <table class="table">
      <thead><tr><th>Description</th><th>Amount</th><th>Source</th></tr></thead>
      <tbody id="expenses"></tbody>
    </table>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCjZnPTgg0KH1kJfnJT_dxMQ1NgRNVH0EY",
  authDomain: "construction-expensis.firebaseapp.com",
  projectId: "construction-expensis",
};

let db;
let S = {sources:[],expenses:[]};

function initFirebase(){
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
}

function saveToCloud(){
  if(!db) return;
  db.collection("ledger").doc("shared").set(S);
}

function loadFromCloud(){
  if(!db) return;
  db.collection("ledger").doc("shared").onSnapshot(doc=>{
    if(doc.exists){
      S = doc.data();
      render();
    }
  });
}

function saveWrapper(){
  localStorage.setItem('data',JSON.stringify(S));
  saveToCloud();
}

function loadLocal(){
  const d=localStorage.getItem('data');
  if(d) S=JSON.parse(d);
}

function addSource(){
  const name=document.getElementById('name').value;
  const total=parseFloat(document.getElementById('total').value)||0;
  const recv=parseFloat(document.getElementById('recv').value)||0;

  S.sources.push({id:Date.now(),name,total,recv});
  saveWrapper();
  render();
}

function addExpense(){
  const desc=document.getElementById('desc').value;
  const amt=parseFloat(document.getElementById('amt').value)||0;
  const src=document.getElementById('srcSelect').value;

  S.expenses.push({desc,amt,src});
  saveWrapper();
  render();
}

function render(){
  const sEl=document.getElementById('sources');
  sEl.innerHTML = S.sources.map(s=>
    `<div>${s.name} | ₹${s.recv}/${s.total}</div>`
  ).join('');

  const expEl=document.getElementById('expenses');
  expEl.innerHTML = S.expenses.map(e=>
    `<tr><td>${e.desc}</td><td>₹${e.amt}</td><td>${getSourceName(e.src)}</td></tr>`
  ).join('');

  const sel=document.getElementById('srcSelect');
  sel.innerHTML = S.sources.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
}

function getSourceName(id){
  const s=S.sources.find(x=>x.id==id);
  return s? s.name : '-';
}

function toggleSidebar(){
  document.querySelector('.sidebar').classList.toggle('collapsed');
}

function copyShareLink(){
  navigator.clipboard.writeText(window.location.href);
  alert('Link copied');
}

function startApp(){
  loadLocal();
  render();

  setTimeout(()=>{
    if(window.firebase){
      initFirebase();
      loadFromCloud();
    }
  },500);
}

window.onload = startApp;
</script>

</body>
</html>
