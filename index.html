<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCjZnPTgg0KH1kJfnJT_dxMQ1NgRNVH0EY",
  authDomain: "construction-expensis.firebaseapp.com",
  projectId: "construction-expensis",
};

let db;

function initFirebase(){
  const app = firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
}

// CLOUD SAVE
function saveToCloud(){
  if(!db) return;
  db.collection("ledger").doc("shared").set(S);
}

// REALTIME SYNC
function loadFromCloud(){
  if(!db) return;
  db.collection("ledger").doc("shared").onSnapshot(doc=>{
    if(doc.exists){
      S = doc.data();
      renderDash();
      renderSrc();
      renderExp();
    }
  });
}

// OVERRIDE SAVE
const originalSave = save;
save = function(){
  originalSave();
  saveToCloud();
}

// WAIT FOR FIREBASE
function waitForFirebase(){
  if(window.firebase){
    initFirebase();
    loadFromCloud();
  } else {
    setTimeout(waitForFirebase, 200);
  }
}
window.addEventListener('load', waitForFirebase);

// SIDEBAR TOGGLE
function toggleSidebar(){
  const sb = document.querySelector('.sidebar');
  sb.classList.toggle('collapsed');
  localStorage.setItem('sidebar', sb.classList.contains('collapsed'));
}

// RESTORE SIDEBAR
window.addEventListener('load', ()=>{
  if(localStorage.getItem('sidebar') === 'true'){
    document.querySelector('.sidebar').classList.add('collapsed');
  }
});

// SHARE LINK FUNCTION
function copyShareLink(){
  const url = window.location.href;
  navigator.clipboard.writeText(url);
  toast('Link copied! Share with family');
}
</script>

<!-- ADD BUTTON IN HEADER / SIDEBAR -->
<button onclick="copyShareLink()" style="margin:10px">🔗 Share</button>

<!-- UPDATED UPDATE LOGIC -->
<script>
function doUpdSrc(){
  const id=document.getElementById('us-id').value;
  const newTotalReceived=parseFloat(document.getElementById('us-amt').value)||0;
  const notes=document.getElementById('us-notes').value.trim();
  const date=document.getElementById('us-date').value;

  const src=S.sources.find(s=>s.id===id);
  if(!src) return;

  if(newTotalReceived <= src.recv){
    toast('Must be greater than current received','e');
    return;
  }

  if(newTotalReceived > src.total){
    src.total = newTotalReceived;
  }

  const diff = newTotalReceived - src.recv;
  src.recv = newTotalReceived;

  src.history = src.history || [];
  src.history.push({date, amount: diff, notes});

  save();
  cm('mo-updsrc');
  renderSrc();
  renderDash();

  toast('Updated successfully');
}
</script>
