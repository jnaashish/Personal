<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BuildLedger Final</title>

<style>
body{margin:0;font-family:Arial;background:#f5f6f8}
.sidebar{width:220px;background:#111;color:#fff;height:100vh;position:fixed;padding:10px}
.sidebar.collapsed{width:60px}
.main{margin-left:220px;padding:20px}
.sidebar.collapsed + .main{margin-left:60px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
input,select{width:100%;padding:8px;margin:5px 0}
button{padding:8px 12px;margin:5px;cursor:pointer}
.bar{height:10px;background:#eee;border-radius:6px}
.fill{height:100%;background:#c17f3a}
</style>
</head>
<body>

<div class="sidebar">
<button onclick="toggleSidebar()">☰</button>
<button onclick="copyShareLink()">Share</button>
<button onclick="downloadBackup()">Backup</button>
<input type="file" onchange="uploadBackup(event)">
</div>

<div class="main">
<h2>BuildLedger</h2>

<div class="card">
<input id="name" placeholder="Source name">
<input id="total" placeholder="Total">
<button onclick="addSource()">Add Source</button>
</div>

<div class="card">
<select id="srcSel"></select>
<input id="amt" placeholder="Expense">
<button onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
<h3>Sources</h3>
<div id="sources"></div>
</div>

<div class="card">
<h3>Expenses</h3>
<div id="expenses"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={apiKey:"AIzaSyCjZnPTgg0KH1kJfnJT_dxMQ1NgRNVH0EY",authDomain:"construction-expensis.firebaseapp.com",projectId:"construction-expensis"};

let db;
let S={sources:[],expenses:[]};

function initFirebase(){firebase.initializeApp(firebaseConfig);db=firebase.firestore();}

function save(){
localStorage.setItem('data',JSON.stringify(S));
if(db)db.collection('ledger').doc('shared').set(S);
}

function load(){
const d=localStorage.getItem('data');
if(d)S=JSON.parse(d);
}

function loadCloud(){
if(!db)return;
db.collection('ledger').doc('shared').onSnapshot(doc=>{
if(doc.exists){
S=doc.data();
normalizeData();
render();
}
});
}

function normalizeData(){
S.sources.forEach(s=>{
if(s.received===undefined)s.received=s.recv||0;
if(s.spent===undefined)s.spent=0;
});
}

function addSource(){
const name=document.getElementById('name').value;
const total=parseFloat(document.getElementById('total').value)||0;
if(!name||total<=0)return;

S.sources.push({id:Date.now(),name,total,received:0,spent:0});
save();render();
}

function addExpense(){
const id=document.getElementById('srcSel').value;
const amt=parseFloat(document.getElementById('amt').value)||0;
const src=S.sources.find(s=>s.id==id);
if(!src||amt<=0)return;

const available=src.received-src.spent;
if(amt>available){alert('Exceeds balance');return;}

src.spent+=amt;
S.expenses.push({id:Date.now(),src:id,amt});
save();render();
}

function deleteExpense(id){
const exp=S.expenses.find(e=>e.id==id);
const src=S.sources.find(s=>s.id==exp.src);
src.spent-=exp.amt;
S.expenses=S.expenses.filter(e=>e.id!=id);
save();render();
}

function render(){

const sel=document.getElementById('srcSel');
sel.innerHTML=S.sources.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');

const sEl=document.getElementById('sources');
sEl.innerHTML=S.sources.map(s=>{
const pct=s.total?((s.spent/s.total)*100):0;
return `<div>
${s.name} ₹${s.spent}/${s.total}
<div class="bar"><div class="fill" style="width:${pct}%"></div></div>
</div>`;
}).join('');

const eEl=document.getElementById('expenses');
eEl.innerHTML=S.expenses.map(e=>`<div>
₹${e.amt}
<button onclick="deleteExpense(${e.id})">❌</button>
</div>`).join('');
}

function toggleSidebar(){
document.querySelector('.sidebar').classList.toggle('collapsed');
}

function copyShareLink(){navigator.clipboard.writeText(window.location.href);alert('Copied');}

function downloadBackup(){
const a=document.createElement('a');
a.href='data:application/json,'+encodeURIComponent(JSON.stringify(S));
a.download='backup.json';
a.click();
}

function uploadBackup(e){
const r=new FileReader();
r.onload=()=>{S=JSON.parse(r.result);save();render();};
r.readAsText(e.target.files[0]);
}

function start(){
load();
normalizeData();
render();
setTimeout(()=>{initFirebase();loadCloud();},500);
}

window.onload=start;
</script>

</body>
</html>
