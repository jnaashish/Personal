<!-- 1. UPDATE RECEIVED LABEL -->
<label>Total Received So Far (₹)</label>
<input type="number" id="us-amt" placeholder="Enter cumulative received amount"/>

<script>
// 1. FIX: CUMULATIVE UPDATE LOGIC
function doUpdSrc(){
  const id=document.getElementById('us-id').value;
  const newTotalReceived=parseFloat(document.getElementById('us-amt').value)||0;
  const notes=document.getElementById('us-notes').value.trim();
  const date=document.getElementById('us-date').value;

  const src=S.sources.find(s=>s.id===id);
  if(!src)return;

  if(newTotalReceived<=src.recv){
    toast('Must be greater than current received','e');
    return;
  }

  if(newTotalReceived>src.total){
    src.total=newTotalReceived;
  }

  const diff=newTotalReceived-src.recv;
  src.recv=newTotalReceived;

  src.history=src.history||[];
  src.history.push({date,amount:diff,notes});

  save();
  saveToCloud();

  cm('mo-updsrc');
  renderSrc();
  renderDash();

  toast('Updated successfully');
}

// 2. FIREBASE SETUP (REPLACE YOUR KEYS)
const firebaseConfig = {
  apiKey: "AIzaSyCjZnPTgg0KH1kJfnJT_dxMQ1NgRNVH0EY",
  authDomain: "construction-expensis.firebaseapp.com",
  projectId: "construction-expensis",
};

let db;

function initFirebase(){
  if(!window.firebase)return;
  const app = firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
}

function saveToCloud(){
  if(!db)return;
  db.collection("ledger").doc("shared").set(S);
}

function loadFromCloud(){
  if(!db)return;
  db.collection("ledger").doc("shared").onSnapshot(doc=>{
    if(doc.exists){
      S = doc.data();
      renderDash();
      renderSrc();
      renderExp();
    }
  });
}

// MODIFY EXISTING SAVE()
const originalSave = save;
save = function(){
  originalSave();
  saveToCloud();
}

// INIT ON LOAD
window.addEventListener('load', ()=>{
  initFirebase();
  loadFromCloud();
});

// 3. SIDEBAR TOGGLE
function toggleSidebar(){
  const sb = document.querySelector('.sidebar');
  sb.classList.toggle('collapsed');
  localStorage.setItem('sidebar', sb.classList.contains('collapsed'));
}

// RESTORE STATE
window.addEventListener('load', ()=>{
  if(localStorage.getItem('sidebar') === 'true'){
    document.querySelector('.sidebar').classList.add('collapsed');
  }
});
</script>
