<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuildLedger</title>

<style>
body{font-family:Arial;margin:0}
.sidebar{width:200px;background:#222;color:#fff;height:100vh;position:fixed;padding:10px}
.sidebar.collapsed{width:60px}
.main{margin-left:200px;padding:20px}
.sidebar.collapsed + .main{margin-left:60px}
button{padding:6px 10px;margin:5px}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="toggleSidebar()">☰</button>
  <button onclick="copyShareLink()">🔗 Share</button>
</div>

<div class="main">
  <h2>BuildLedger</h2>

  <h3>Add Source</h3>
  <input id="name" placeholder="Name"><br>
  <input id="total" placeholder="Total"><br>
  <input id="recv" placeholder="Received"><br>
  <button onclick="addSource()">Add</button>

  <h3>Sources</h3>
  <div id="list"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCjZnPTgg0KH1kJfnJT_dxMQ1NgRNVH0EY",
  authDomain: "construction-expensis.firebaseapp.com",
  projectId: "construction-expensis",
};

let db;
let S = {sources:[]};

function initFirebase(){
  firebase.initializeApp(firebaseConfig);
  db = firebase.firestore();
}

function saveToCloud(){
  if(!db) return;
  db.collection("ledger").doc("shared").set(S);
}

function loadFromCloud(){
  if(!db) return;
  db.collection("ledger").doc("shared").onSnapshot(doc=>{
    if(doc.exists){
      S = doc.data();
      render();
    }
  });
}

function saveWrapper(){
  localStorage.setItem('data',JSON.stringify(S));
  saveToCloud();
}

function loadLocal(){
  const d=localStorage.getItem('data');
  if(d) S=JSON.parse(d);
}

function addSource(){
  const name=document.getElementById('name').value;
  const total=parseFloat(document.getElementById('total').value)||0;
  const recv=parseFloat(document.getElementById('recv').value)||0;

  S.sources.push({name,total,recv});
  saveWrapper();
  render();
}

function render(){
  const el=document.getElementById('list');
  el.innerHTML = S.sources.map(s=>
    `<div>${s.name} | Total: ${s.total} | Received: ${s.recv}</div>`
  ).join('');
}

function toggleSidebar(){
  document.querySelector('.sidebar').classList.toggle('collapsed');
}

function copyShareLink(){
  navigator.clipboard.writeText(window.location.href);
  alert('Link copied');
}

function startApp(){
  loadLocal();
  render();

  setTimeout(()=>{
    if(window.firebase){
      initFirebase();
      loadFromCloud();
    }
  },500);
}

window.onload = startApp;
</script>

</body>
</html>
