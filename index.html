<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BuildLedger</title>

<style>
body{margin:0;font-family:Arial;background:#f5f6f8}
.sidebar{width:220px;background:#111;color:#fff;height:100vh;position:fixed;padding:10px}
.sidebar.collapsed{width:60px}
.main{margin-left:220px;padding:20px}
.sidebar.collapsed + .main{margin-left:60px}
.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:15px}
input,select{width:100%;padding:8px;margin:5px 0}
button{padding:8px 12px;margin:5px;cursor:pointer}
.bar{height:10px;background:#eee;border-radius:6px}
.fill{height:100%;background:#c17f3a}
</style>
</head>

<body>

<div class="sidebar">
<button onclick="toggleSidebar()">☰</button>
<button onclick="copyShareLink()">Share</button>
<button onclick="downloadBackup()">Backup</button>
<input type="file" onchange="uploadBackup(event)">
</div>

<div class="main">
<h2>BuildLedger</h2>

<div class="card">
<input id="src-name" placeholder="Source name">
<input id="src-total" placeholder="Total">
<input id="src-recv" placeholder="Received">
<button onclick="addSource()">Add Source</button>
</div>

<div class="card">
<select id="srcSel"></select>
<input id="amt" placeholder="Expense">
<button onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
<h3>Sources</h3>
<div id="sources"></div>
</div>

<div class="card">
<h3>Expenses</h3>
<div id="expenses"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig={
  apiKey:"AIzaSyCjZnPTgg0KH1kJfnJT_dxMQ1NgRNVH0EY",
  authDomain:"construction-expensis.firebaseapp.com",
  projectId:"construction-expensis"
};

let db;
let S={sources:[],expenses:[]};

function initFirebase(){
  firebase.initializeApp(firebaseConfig);
  db=firebase.firestore();
}

function save(){
  localStorage.setItem('data',JSON.stringify(S));
  if(db) db.collection('ledger').doc('shared').set(S);
}

function load(){
  const d=localStorage.getItem('data');
  if(d) S=JSON.parse(d);
}

function loadCloud(){
  if(!db) return;
  db.collection('ledger').doc('shared').onSnapshot(doc=>{
    if(doc.exists){
      S=doc.data();
      normalizeData();
      render();
    }
  });
}

function normalizeData(){
  S.sources.forEach(s=>{
    if(s.recv===undefined) s.recv=0;
    if(!s.history) s.history=[];
  });
}

function uid(){return Date.now()}

function addSource(){
  const name=document.getElementById('src-name').value;
  const total=parseFloat(document.getElementById('src-total').value)||0;
  const recv=parseFloat(document.getElementById('src-recv').value)||0;

  if(!name||total<=0) return;

  S.sources.push({
    id:uid(),
    name,
    total,
    recv,
    history: recv>0 ? [{
      date:new Date().toISOString().split('T')[0],
      amount:recv,
      notes:'Initial'
    }] : []
  });

  save();
  render();
}

function addExpense(){
  const id=document.getElementById('srcSel').value;
  const amt=parseFloat(document.getElementById('amt').value)||0;
  const src=S.sources.find(s=>s.id==id);

  if(!src||amt<=0) return;

  const spent = S.expenses
    .filter(e=>e.src==id)
    .reduce((a,b)=>a+b.amt,0);

  if(amt > (src.recv - spent)){
    alert('Not enough balance');
    return;
  }

  S.expenses.push({
    id:uid(),
    src:id,
    amt
  });

  save();
  render();
}

function deleteExpense(id){
  S.expenses = S.expenses.filter(e=>e.id!=id);
  save();
  render();
}

function render(){

  // dropdown
  document.getElementById('srcSel').innerHTML =
    S.sources.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');

  // sources
  document.getElementById('sources').innerHTML =
    S.sources.map(s=>{
      const spent = S.expenses
        .filter(e=>e.src==s.id)
        .reduce((a,b)=>a+b.amt,0);

      const pct = s.total ? (spent/s.total)*100 : 0;

      return `<div>
        ${s.name} ₹${spent}/${s.total}
        <div class="bar"><div class="fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join('');

  // expenses
  document.getElementById('expenses').innerHTML =
    S.expenses.map(e=>`
      <div>
        ₹${e.amt}
        <button onclick="deleteExpense(${e.id})">❌</button>
      </div>
    `).join('');
}

function toggleSidebar(){
  document.querySelector('.sidebar').classList.toggle('collapsed');
}

function copyShareLink(){
  navigator.clipboard.writeText(window.location.href);
  alert('Copied');
}

function downloadBackup(){
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify(S));
  a.download='backup.json';
  a.click();
}

function uploadBackup(e){
  const r=new FileReader();
  r.onload=()=>{
    S=JSON.parse(r.result);
    save();
    render();
  };
  r.readAsText(e.target.files[0]);
}

function start(){
  load();
  normalizeData();
  render();
  setTimeout(()=>{
    initFirebase();
    loadCloud();
  },500);
}

window.onload=start;
</script>

</body>
</html>
